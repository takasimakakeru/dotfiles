<!-- ポモドーロタイマーを作っていく-->
<!--モバイルファーストで開発-->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
	<!--拡張性の高いタグなどで記述-->
    <header>
	<h1>ポモドーロタイマー</h1>
    </header>
<main>
    <section class="timer-container">
        <div class="timer-circle">
            <div class="time-display">25:00</div>
        </div>
        
        <div class="timer-buttons">
            <button id="start-btn" class="timer-button">スタート</button>
            <button id="stop-btn" class="timer-button">ストップ</button>
            <button id="reset-btn" class="timer-button">リセット</button>
        </div>
    </section>
</main>
    <script src="index.js"></script>
</body>
</html>
